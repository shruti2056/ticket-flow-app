services:
  backend:
    build: ./backend/backend
    container_name: ticketflow-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/backend/.env
    restart: always

  frontend:
    build: ./frontend
    container_name: ticketflow-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always